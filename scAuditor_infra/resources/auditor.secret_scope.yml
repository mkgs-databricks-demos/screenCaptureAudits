# Secret scope for storing SC Auditor service principal and target system credentials.
#
# Keys are split into two categories:
#
# AUTO-PROVISIONED by the ensure-service-principal notebook (UC setup job):
#   client_id          — SPN application_id (OAuth M2M client identifier)
#   workspace_url      — Databricks workspace URL
#
# ADMIN-PROVISIONED (must be created manually after first deploy):
#   client_secret      — OAuth M2M secret (generated via UI, CLI, or external keystore)
#
# To provision the client_secret:
#   1. Workspace UI: Settings > Identity and access > Service principals
#      > select 'sc-auditor-{schema}' > Secrets > Generate secret
#   2. Databricks CLI: databricks account service-principal-secrets create <sp_id>
#   3. External keystore: sync from Azure Key Vault, AWS Secrets Manager, HashiCorp Vault
#
# Then store the secret:
#   databricks secrets put-secret sc_auditor_credentials \
#     <client_secret_dbs_key> --string-value "<secret>"
#
# NOTE: The SC Auditor SPN's READ permission on this scope is granted
# dynamically by the ensure-service-principal notebook (via secrets.put_acl),
# not declared here. Only admin/deploy permissions are declared below.

resources:
  secret_scopes:
    sc_auditor_secret_scope:
      name: ${var.secret_scope_name}

      # Databricks-managed backend (not Azure Key Vault or AWS Secrets Manager backed)
      backend_type: DATABRICKS

      # Prevent accidental deletion of the secret scope
      lifecycle:
        prevent_destroy: true

# ---------------------------------------------------------------------------
# Target-specific permissions
# (SC Auditor SPN READ is handled by the ensure-service-principal notebook)
# ---------------------------------------------------------------------------
targets:

  dev:
    resources:
      secret_scopes:
        sc_auditor_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - user_name: ${var.run_as_user}
              level: MANAGE
            - user_name: matthew.giglia@databricks.com
              level: MANAGE

  hls_fde:
    resources:
      secret_scopes:
        sc_auditor_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher-level service principal for automated deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE

  prod:
    resources:
      secret_scopes:
        sc_auditor_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher-level service principal for automated deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE
